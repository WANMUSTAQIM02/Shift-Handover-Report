<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shift Handover Report</title>
    
    <!-- Logo Favicon SVG (Premium) -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome (Untuk Icon) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container py-5 max-w-custom">
    <!-- Header -->
    <div class="mb-4 text-center">
        <h2 class="fw-bold text-white mb-1"><i class="fa-solid fa-clipboard-check text-primary me-2"></i> Shift Handover Report</h2>
        <p class="text-muted">Automated log generator for ManageEngine ServiceDesk Plus</p>
    </div>

    <div class="row g-4">
        <!-- Input Section -->
        <div class="col-lg-5">
            <div class="card custom-card border-0">
                <div class="card-body p-4">
                    <h5 class="card-title fw-semibold text-white mb-4"><i class="fa-solid fa-sliders me-2 text-primary"></i> Shift Details</h5>
                    
                    <form id="reportForm">
                        <div class="mb-3">
                            <label class="form-label text-muted small text-uppercase fw-bold tracking-wide">Report Date</label>
                            <input type="date" id="reportDate" class="form-control custom-input" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label text-muted small text-uppercase fw-bold tracking-wide">Shift</label>
                            <select id="shiftSelect" class="form-select custom-input" required>
                                <option value="AM">☀️ Morning (07:00 AM - 06:59 PM)</option>
                                <option value="PM">🌙 Night (07:00 PM - 06:59 AM)</option>
                            </select>
                        </div>

                        <!-- Current Shift Engineers -->
                        <div class="row mb-4">
                            <label class="form-label text-muted small text-uppercase fw-bold tracking-wide">Current Shift Engineers</label>
                            <div class="col-6">
                                <select id="eng1" class="form-select custom-input" required>
                                    <option value="" disabled selected>Engineer 1...</option>
                                </select>
                            </div>
                            <div class="col-6">
                                <select id="eng2" class="form-select custom-input" required>
                                    <option value="" disabled selected>Engineer 2...</option>
                                </select>
                            </div>
                        </div>

                        <!-- Next Shift Engineers -->
                        <div class="row mb-4">
                            <label class="form-label text-muted small text-uppercase fw-bold tracking-wide">Next Shift Engineers</label>
                            <div class="col-6">
                                <select id="nextEng1" class="form-select custom-input" required>
                                    <option value="" disabled selected>Engineer 1...</option>
                                </select>
                            </div>
                            <div class="col-6">
                                <select id="nextEng2" class="form-select custom-input" required>
                                    <option value="" disabled selected>Engineer 2...</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label text-muted small text-uppercase fw-bold tracking-wide">Upload ManageEngine Log</label>
                            <input type="file" id="excelFile" class="form-control custom-input" accept=".xlsx, .xls" required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold shadow-sm">
                            <i class="fa-solid fa-wand-magic-sparkles me-2"></i> Generate Report
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Output Section -->
        <div class="col-lg-7">
            <div class="card custom-card border-0">
                <div class="card-body p-4 d-flex flex-column">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="card-title fw-semibold text-white mb-0"><i class="fa-solid fa-terminal me-2 text-success"></i> Output</h5>
                        <button id="copyBtn" class="btn btn-success btn-sm px-3 fw-medium rounded-pill shadow-sm" disabled>
                            <i class="fa-regular fa-copy me-1"></i> Copy Report
                        </button>
                    </div>
                    
                    <div id="alertBox" class="d-none"></div>

                    <!-- Kotak Output Teks Automatik Meregang (Auto-Stretch) -->
                    <textarea id="outputText" class="form-control custom-textarea" readonly placeholder="Waiting for data..."></textarea>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Scripts (Wajib untuk aplikasi berfungsi) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dayjs@1/plugin/customParseFormat.js"></script>
<script>dayjs.extend(window.dayjs_plugin_customParseFormat)</script>
<script src="script.js"></script>

</body>
</html>
