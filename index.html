<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shift Handover Report</title>
    
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>

    <link rel="stylesheet" href="style.css">
    
    <!-- Vercel Web Analytics -->
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
</head>
<body>

<div class="bg-orb orb-1"></div>
<div class="bg-orb orb-2"></div>
<div class="bg-orb orb-3"></div>

<div class="container py-5 max-w-custom position-relative z-1">
    <div class="mb-5 text-center header-aesthetic">
        <img src="favicon.svg" alt="Shift Handover Logo" class="mx-auto mb-3" style="width: 76px; height: 76px; box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4); border-radius: 18px;">
        
        <h2 class="fw-bold text-white mb-2 tracking-tight">Shift Handover</h2>
        <p class="text-muted-aesthetic">Automated log generator for ManageEngine</p>
    </div>

    <div class="row g-4 justify-content-center">
        <div class="col-lg-5">
            <div class="card glass-card border-0 h-100">
                <div class="card-body p-4 p-md-5">
                    <h6 class="text-uppercase fw-bold text-primary-aesthetic mb-4"><i class="fa-solid fa-sliders me-2"></i> Configuration</h6>
                    
                    <form id="reportForm">
                        <div class="mb-4">
                            <label class="form-label text-muted-aesthetic small fw-semibold">Report Date</label>
                            <input type="date" id="reportDate" class="form-control glass-input" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label text-muted-aesthetic small fw-semibold">Shift Timeline</label>
                            <select id="shiftSelect" class="form-select glass-input" required>
                                <option value="AM">☀️ Morning (07:00 AM - 06:59 PM)</option>
                                <option value="PM">🌙 Night (07:00 PM - 06:59 AM)</option>
                            </select>
                        </div>

                        <div class="row mb-4">
                            <label class="form-label text-muted-aesthetic small fw-semibold">Duty Engineers</label>
                            <div class="col-6">
                                <select id="eng1" class="form-select glass-input" required>
                                    <option value="" disabled selected>Select...</option>
                                </select>
                            </div>
                            <div class="col-6">
                                <select id="eng2" class="form-select glass-input" required>
                                    <option value="" disabled selected>Select...</option>
                                </select>
                            </div>
                        </div>

                        <div class="row mb-4">
                            <label class="form-label text-muted-aesthetic small fw-semibold">Next Shift Handover</label>
                            <div class="col-6">
                                <select id="nextEng1" class="form-select glass-input" required>
                                    <option value="" disabled selected>Select...</option>
                                </select>
                            </div>
                            <div class="col-6">
                                <select id="nextEng2" class="form-select glass-input" required>
                                    <option value="" disabled selected>Select...</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-5">
                            <label class="form-label text-muted-aesthetic small fw-semibold">ManageEngine Export (.xls)</label>
                            <input type="file" id="excelFile" class="form-control glass-input file-input" accept=".xlsx, .xls" required>
                        </div>

                        <button type="submit" class="btn btn-aesthetic w-100 py-3 fw-bold shadow-lg">
                            Generate Report <i class="fa-solid fa-arrow-right ms-2"></i>
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-lg-7">
            <div class="card glass-card border-0 h-100">
                <div class="card-body p-4 p-md-5 d-flex flex-column">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h6 class="text-uppercase fw-bold text-success-aesthetic mb-0"><i class="fa-solid fa-terminal me-2"></i> Terminal Output</h6>
                        <button id="copyBtn" class="btn btn-glass-success btn-sm px-4 py-2 fw-semibold rounded-pill" disabled>
                            <i class="fa-regular fa-copy me-1"></i> Copy
                        </button>
                    </div>
                    
                    <div id="alertBox" class="d-none"></div>

                    <textarea id="outputText" class="form-control glass-textarea flex-grow-1" readonly placeholder="Awaiting execution..."></textarea>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dayjs@1/plugin/customParseFormat.js"></script>
<script>dayjs.extend(window.dayjs_plugin_customParseFormat)</script>
<script src="script.js"></script>

</body>
</html>
