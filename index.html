<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shift Handover Report</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="container min-vh-100 d-flex align-items-center position-relative z-1 py-5">
    <div class="row w-100 align-items-center justify-content-between g-5">
        
        <div class="col-lg-5 text-center text-lg-start mb-5 mb-lg-0 pe-lg-4">
            <img src="favicon.svg" alt="Shift Handover Logo" class="mb-4 logo-3d" style="width: 90px; height: 90px;">
            <h1 class="fw-bold text-white mb-3 tracking-tight display-5">Shift Handover</h1>
            <p class="text-muted-aesthetic fs-5 mb-4">Automated log generator for ManageEngine.</p>
            
            <div class="d-none d-lg-block mt-5 pt-4 border-top border-secondary border-opacity-25">
                <div class="d-flex align-items-center gap-3 text-muted-aesthetic small mb-3">
                    <div class="p-2 rounded-circle bg-success bg-opacity-10 text-success-aesthetic">
                        <i class="fa-solid fa-shield-halved"></i>
                    </div>
                    <span class="fw-medium">Local Environment Processing</span>
                </div>
                <div class="d-flex align-items-center gap-3 text-muted-aesthetic small">
                    <div class="p-2 rounded-circle bg-primary bg-opacity-10 text-primary-aesthetic">
                        <i class="fa-solid fa-bolt"></i>
                    </div>
                    <span class="fw-medium">Zero-Delay Matrix Analysis</span>
                </div>
            </div>
        </div>

        <div class="col-lg-6 position-relative" id="mainRow">
            
            <div class="view-panel" id="configColumn">
                <div class="card glass-card border-0 h-100">
                    <div class="card-body p-4 p-md-5">
                        <h6 class="text-uppercase fw-bold text-primary-aesthetic mb-4"><i class="fa-solid fa-sliders me-2"></i> Configuration</h6>
                        <form id="reportForm">
                            <div class="mb-4">
                                <label class="form-label text-muted-aesthetic small fw-semibold">Report Date</label>
                                <input type="date" id="reportDate" class="form-control glass-input" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-muted-aesthetic small fw-semibold">Shift Timeline</label>
                                <select id="shiftSelect" class="form-select glass-input" required>
                                    <option value="AM">☀️ Morning (07:00 AM - 06:59 PM)</option>
                                    <option value="PM">🌙 Night (07:00 PM - 06:59 AM)</option>
                                </select>
                            </div>
                            <div class="row mb-4">
                                <label class="form-label text-muted-aesthetic small fw-semibold">Duty Engineers</label>
                                <div class="col-6">
                                    <select id="eng1" class="form-select glass-input" required>
                                        <option value="" disabled selected>Select...</option>
                                    </select>
                                </div>
                                <div class="col-6">
                                    <select id="eng2" class="form-select glass-input" required>
                                        <option value="" disabled selected>Select...</option>
                                    </select>
                                </div>
                            </div>
                            <div class="row mb-4">
                                <label class="form-label text-muted-aesthetic small fw-semibold">Next Shift Handover</label>
                                <div class="col-6">
                                    <select id="nextEng1" class="form-select glass-input" required>
                                        <option value="" disabled selected>Select...</option>
                                    </select>
                                </div>
                                <div class="col-6">
                                    <select id="nextEng2" class="form-select glass-input" required>
                                        <option value="" disabled selected>Select...</option>
                                    </select>
                                </div>
                            </div>
                            <div class="mb-5">
                                <label class="form-label text-muted-aesthetic small fw-semibold">ManageEngine Export (.xls)</label>
                                <label for="excelFile" class="file-drop-area w-100 d-flex flex-column align-items-center justify-content-center py-4 text-center cursor-pointer">
                                    <i class="fa-solid fa-cloud-arrow-up text-primary-aesthetic mb-2 fs-3 icon-pulse"></i>
                                    <span class="small text-muted-aesthetic fw-semibold">Click to upload ManageEngine Log</span>
                                    <input type="file" id="excelFile" class="d-none" accept=".xlsx, .xls" required>
                                    <div id="fileNameDisplay" class="small text-success-aesthetic mt-2 fw-medium d-none"></div>
                                </label>
                            </div>
                            <button type="submit" id="generateBtn" class="btn btn-aesthetic w-100 py-3 fw-bold shadow-lg">
                                Generate Report <i class="fa-solid fa-arrow-right ms-2"></i>
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="view-panel d-none" id="terminalColumn">
                <div class="card glass-card border-0 h-100 d-flex flex-column" style="min-height: 650px;">
                    <div class="terminal-bar d-flex align-items-center justify-content-between px-4 py-3 border-bottom">
                        <div class="d-flex gap-2 mac-buttons-wrapper" id="backBtn" title="Back to Configuration">
                            <span class="dot-mac dot-red"></span>
                            <span class="dot-mac dot-yellow"></span>
                            <span class="dot-mac dot-green"></span>
                        </div>
                        <span class="text-uppercase small tracking-wider text-muted-aesthetic fw-bold" style="font-size: 11px;">System Terminal Output</span>
                        <button id="copyBtn" class="btn btn-glass-success btn-sm px-4 py-1.5 fw-semibold rounded-pill" disabled>
                            <i class="fa-regular fa-copy me-1"></i> Copy
                        </button>
                    </div>
                    <div class="card-body p-4 p-md-5 d-flex flex-column flex-grow-1 pt-3">
                        <div id="alertBox" class="d-none"></div>
                        <textarea id="outputText" class="form-control glass-textarea flex-grow-1" readonly placeholder="Awaiting execution..."></textarea>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dayjs@1/plugin/customParseFormat.js"></script>
<script>dayjs.extend(window.dayjs_plugin_customParseFormat)</script>
<script src="script.js"></script>

</body>
</html>
